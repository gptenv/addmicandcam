# cloudbuild.yaml
# Build and deploy LLM Telepresence Browser Lab to GCP Cloud Run using Cloud Build.
# Trigger this from your GCP project (e.g. via gcloud builds submit or Cloud Build triggers on git push).
#
# Prerequisites (one-time):
#   gcloud services enable cloudbuild.googleapis.com run.googleapis.com artifactregistry.googleapis.com
#   gcloud artifacts repositories create telepresence-images --repository-format=docker --location=REGION
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml --substitutions=_REGION=us-central1,_SERVICE=telepresence-lab,_REPO=telepresence-images
#
# After first deploy, set a strong ADMIN_TOKEN (via Secret Manager recommended) and PUBLIC_BASE_URL.

steps:
  # Build the production image (uses the root Dockerfile which installs ffmpeg/espeak/playwright/etc.)
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest'
      - '.'
    timeout: '1200s'  # Playwright Chromium download + build can be slow on first runs

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}'

  # Deploy to Cloud Run with production-grade defaults for a browser automation workload
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ${_SERVICE} \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --memory 2Gi \
          --cpu 2 \
          --concurrency 1 \
          --max-instances 5 \
          --min-instances 0 \
          --port 3000 \
          --timeout 900s \
          --set-env-vars "NODE_ENV=production,HEADLESS=true,HOST=0.0.0.0,PORT=3000,APP_DATA_DIR=/data,ALLOW_UNAUTHENTICATED_LOCAL=false,MAX_SESSIONS=4,SESSION_TTL_MS=3600000,UPLOAD_MAX_BYTES=52428800,ALLOW_PRIVATE_NETWORKS=false,DISCLOSURE_WATERMARK_ENABLED=true,DISCLOSURE_WATERMARK_LABEL=AI-assisted" \
          --update-secrets "ADMIN_TOKEN=${_SECRET_NAME}:latest" || \
        gcloud run deploy ${_SERVICE} \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --memory 2Gi \
          --cpu 2 \
          --concurrency 1 \
          --max-instances 5 \
          --min-instances 0 \
          --port 3000 \
          --timeout 900s \
          --set-env-vars "NODE_ENV=production,HEADLESS=true,HOST=0.0.0.0,PORT=3000,APP_DATA_DIR=/data,ALLOW_UNAUTHENTICATED_LOCAL=false,MAX_SESSIONS=4,SESSION_TTL_MS=3600000,UPLOAD_MAX_BYTES=52428800,ALLOW_PRIVATE_NETWORKS=false,DISCLOSURE_WATERMARK_ENABLED=true,DISCLOSURE_WATERMARK_LABEL=AI-assisted,ADMIN_TOKEN=${_ADMIN_TOKEN:-dev-change-me-in-prod}"
    waitFor: ['push']

# Store the built images for potential rollback / inspection
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest'

# Default substitutions (override on gcloud builds submit --substitutions=...)
substitutions:
  _REGION: us-central1
  _SERVICE: telepresence-lab
  _IMAGE: telepresence-lab
  _REPO: telepresence-images
  # For Secret Manager integration (recommended):
  #   Create secret: gcloud secrets create telepresence-admin-token --data-file=<(echo -n "strong-token-here")
  #   Then pass _SECRET_NAME=telepresence-admin-token
  # If no secret, falls back to ADMIN_TOKEN env in second deploy step (less secure).
  _SECRET_NAME: telepresence-admin-token
  _ADMIN_TOKEN: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # Speeds up Docker builds with large layers (Chromium)

timeout: '1500s'  # 25 minutes max for safety
